# Refresh Message Center and Microsoft 365 Roadmap data

name: update-m365-data

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '@data/**'
  pull_request:
    branches: [ "main" ]
  # Refresh data hourly
  schedule:
    - cron:  '0 * * * *'
    
  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:          
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
      - name: Get Message Center and Roadmap data
        run: |
          ./@build/Update-Site.ps1 -GraphSecret ${{ secrets.GRAPH_SECRET }}
        shell: pwsh
        
      - name: Update repo
        run: |
          if [[ `git status --porcelain` ]]; then
            # Changes
            echo "Updating repo"
            git config --global user.name 'Merill Fernando'
            git config --global user.email 'merill@users.noreply.github.com'
            git add -A && git commit -m "Daily automation"
            git push
          else
            # No changes
            echo "No changes"
          fi
